version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "17:00"
      timezone: Europe/Amsterdam
    assignees:
      - d-claassen

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "17:00"
      timezone: Europe/Amsterdam
    assignees:
      - d-claassen
    groups:
      wordpress:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "@wordpress/*"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "17:00"
      timezone: Europe/Amsterdam
    assignees:
      - d-claassen
    versioning-strategy: widen
    